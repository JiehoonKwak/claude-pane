name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy
      - name: Clippy
        run: cargo clippy --target wasm32-wasip1 -- -D warnings
      - name: Build
        run: cargo build --release --target wasm32-wasip1
      - name: Check WASM size
        run: |
          WASM=$(find target/wasm32-wasip1/release -maxdepth 1 -name '*.wasm' ! -name '*.d' | head -1)
          SIZE=$(stat -c%s "$WASM" 2>/dev/null || stat -f%z "$WASM")
          echo "WASM: $WASM ($SIZE bytes)"
          if [ "$SIZE" -gt 2097152 ]; then
            echo "ERROR: WASM exceeds 2MB limit"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test (host target, pure logic)
        run: cargo test --target x86_64-unknown-linux-gnu
