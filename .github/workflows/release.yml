name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Build
        run: cargo build --release --target wasm32-wasip1
      - name: Prepare artifact
        run: |
          WASM=$(find target/wasm32-wasip1/release -maxdepth 1 -name '*.wasm' ! -name '*.d' | head -1)
          cp "$WASM" zellij-pane-palette.wasm
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: zellij-pane-palette.wasm
          generate_release_notes: true
